<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one{
            color: palevioletred;
        }
        #two_id{
            color: red;
        }
        .two{
            color: blue;
        }
    </style>
</head>
<body>
    <!-- class with same name willhave same property -->
    <h1 class="one">Hello, World 1</h1>
    <h2 class="two">Hello, World 2</h2>
    <p class="one">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Numquam, corporis? 1</p>
    <p class="two" id = "two_id">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Fuga, voluptates. 2</p>
</body>
</html>
