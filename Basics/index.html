
<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
    <style>
        h2{
            color: rebeccapurple;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <!-- This is for external CSS -->
    <h1>External CSS</h1>
    <!-- This is for Internal CSS Written Under Head tag -->
    <h2>Internal CSS</h2>
    <!-- This is Inline CSS Which can be embedded in the HTML Tag itself -->
    <h1 style="color: blue;">Inline CSS</h1>

    <!-- Element Selector is the way to select html tag and perform the operation on it-->
    <h2>This is Heading</h2>

    <!-- priority basis  Inline -> Internal -> External -->

</html>
